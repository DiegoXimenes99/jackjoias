<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joalheria Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" style="display: none;">
        <div class="container">
            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <div class="logo">💎</div>
                    <div class="title-group">
                        <h1>Joalheria Premium</h1>
                        <p>Venda suas pedras e joias</p>
                    </div>
                </div>
                <div class="header-right">
                    <button class="close-btn" onclick="closeShop()">✕</button>
                </div>
            </div>

            <div class="main-content">
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="sell">Vender Itens</button>
                    <button class="tab-btn" data-tab="prices">Tabela de Valores</button>
                </div>

                <!-- Sell Tab -->
                <div class="tab-content active" id="sellTab">
                    <!-- Products Section -->
                    <div class="products-section">
                        <!-- Filters -->
                        <div class="filters">
                            <button class="filter-btn active" data-filter="all">Todos</button>
                            <button class="filter-btn" data-filter="minerals">Minérios</button>
                            <button class="filter-btn" data-filter="jewelry">Joias</button>
                            <button class="filter-btn" data-filter="metals">Metais</button>
                        </div>

                        <!-- Products Grid -->
                        <div class="products-grid" id="productsGrid">
                            <!-- Products will be inserted here -->
                        </div>
                    </div>

                    <!-- Cart Section -->
                    <div class="cart-section">
                        <div class="cart-header">
                            <div class="cart-icon">💰</div>
                            <h2>Vender (<span id="cartCount">0</span>)</h2>
                        </div>

                        <div class="cart-items" id="cartItems">
                            <p class="empty-cart">Selecione itens para vender</p>
                        </div>

                        <div class="cart-footer" id="cartFooter" style="display: none;">
                            <div class="cart-total">
                                <span>Você receberá:</span>
                                <span id="cartTotal">$0</span>
                            </div>
                            <button class="purchase-btn" onclick="sellItems()">Vender Itens</button>
                        </div>
                    </div>
                </div>

                <!-- Prices Tab -->
                <div class="tab-content" id="pricesTab">
                    <div class="prices-container">
                        <div class="prices-header">
                            <h2>💎 Tabela de Valores Atuais</h2>
                            <p>Os preços flutuam a cada 5 minutos</p>
                            <div class="prices-legend">
                                <span class="legend-item">
                                    <span class="price-badge expensive">💎 MAIS CARO</span>
                                    Top 3 itens mais valiosos
                                </span>
                                <span class="legend-item">
                                    <span class="price-badge cheap">💰 MAIS BARATO</span>
                                    Top 3 itens mais acessíveis
                                </span>
                            </div>
                        </div>
                        
                        <div class="prices-filters">
                            <button class="price-filter-btn active" data-filter="all">Todos</button>
                            <button class="price-filter-btn" data-filter="minerals">Minérios</button>
                            <button class="price-filter-btn" data-filter="jewelry">Joias</button>
                            <button class="price-filter-btn" data-filter="metals">Metais</button>
                        </div>

                        <div class="prices-list" id="pricesList">
                            <!-- Prices will be inserted here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
